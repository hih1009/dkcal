<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계정 관리</title>
<style>
  :root{
    --bg:#ffffff;
    --surface:#ffffff;
    --surface-hover:#f4f6f9;
    --border:#e3e6ec;
    --text:#1c1f26;
    --text-dim:#6b7280;
    --text-faint:#9aa0ab;
    --accent:#3b6fe0;
    --accent-dim:#2952b3;
    --mint:#0f9d70;
    --danger:#e0453d;
    --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    --sans: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    padding:32px 24px 80px;
  }
  .wrap{max-width:1180px;margin:0 auto;}

  /* header */
  .header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:14px;}
  .title-block h1{font-size:22px;font-weight:700;margin:0 0 4px;letter-spacing:-0.02em;}
  .title-block p{margin:0;color:var(--text-dim);font-size:13px;}
  .toolbar{display:flex;gap:8px;align-items:center;}
  .search-clear{
    position:absolute;right:6px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;color:var(--text-faint);
    font-size:12px;padding:4px;line-height:1;border-radius:4px;
  }
  .search-clear:hover{color:var(--text);background:var(--surface-hover);}
  .search-wrap{position:relative;display:flex;align-items:center;}
  .search{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 28px 8px 12px;
    font-size:13px;
    color:var(--text);
    width:220px;
    outline:none;
    transition:border-color .15s;
  }
  .search:focus{border-color:var(--accent);}
  .search::placeholder{color:var(--text-faint);}
  .search::-ms-clear,.search::-ms-reveal{display:none;width:0;height:0;}
  .search::-webkit-search-decoration,
  .search::-webkit-search-cancel-button,
  .search::-webkit-search-results-button,
  .search::-webkit-search-results-decoration{-webkit-appearance:none;appearance:none;}
  .btn{
    border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;
    cursor:pointer;display:inline-flex;align-items:center;gap:6px;
    transition:background .15s, transform .1s;
    font-family:var(--sans);
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--accent);color:#0d1117;}
  .btn-primary:hover{background:#7aa1ff;}
  .btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border);}
  .btn-ghost:hover{background:var(--surface-hover);color:var(--text);}
  #driveStatusBtn.connected{color:var(--mint);border-color:var(--mint);}
  #driveStatusBtn.connecting{opacity:.6;}
  #gistStatusBtn.connected{color:var(--mint);border-color:var(--mint);}
  #gistStatusBtn.connecting{opacity:.6;}
  #gistStatusBtn.sync-error{color:#e0a020;border-color:#e0a020;}

  /* table */
  .table{
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    background:var(--surface);
  }
  .row{
    display:grid;
    grid-template-columns: 22px 26px var(--w2,190px) var(--w3,170px) var(--w4,170px) var(--w5,180px) var(--w6,140px) minmax(80px, var(--w7,1fr)) 59px;
    align-items:center;
    padding:0 14px;
    border-bottom:1px solid var(--border);
    min-height:52px;
  }
  .row.head > div{position:relative;}
  .col-resizer{
    position:absolute;top:-1px;right:-8px;width:12px;height:calc(100% + 2px);
    cursor:col-resize;z-index:5;touch-action:none;
  }
  .col-resizer::after{
    content:'';position:absolute;top:0;right:5px;width:2px;height:100%;
    background:transparent;transition:background .15s;
  }
  .col-resizer:hover::after,.col-resizer.resizing::after{background:var(--accent);}
  .row:last-child{border-bottom:none;}
  .row.head{
    background:#f7f8fa;
    color:var(--text-faint);
    font-size:11px;
    font-weight:600;
    letter-spacing:.04em;
    text-transform:uppercase;
    min-height:38px;
  }
  .row.body:hover{background:var(--surface-hover);}
  .cell{padding:8px 8px 8px 0;font-size:13px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  .cell.site{font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;min-width:0;}
  .cell.site .ellip{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1;}
  .site-icon{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}
  .cell.mono{font-family:var(--mono);color:var(--text-dim);font-size:12.5px;min-width:0;}
  .copy-group{display:flex;align-items:center;gap:6px;min-width:0;}
  .copy-group > span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1;}
  .copy-btn{
    background:none;border:none;color:var(--text-faint);cursor:pointer;
    padding:3px;border-radius:5px;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:color .15s, background .15s;
  }
  .copy-btn:hover{color:var(--accent);background:rgba(91,140,255,0.1);}
  .copy-btn.copied{color:var(--mint);}
  .pw-dots{letter-spacing:2px;}
  .cell.memo{color:var(--text-dim);}
  .cell.link a{color:var(--accent);text-decoration:none;font-size:12.5px;}
  .cell.link a:hover{text-decoration:underline;}
  .cell.attach{color:var(--text-faint);font-size:12px;display:flex;flex-wrap:nowrap;gap:5px;overflow:hidden;white-space:nowrap;}
  .cell.attach .clip{opacity:.6;margin-right:4px;}
  .row-num{color:var(--text-faint);font-size:11px;}
  .drag-handle{
    display:flex;align-items:center;justify-content:center;
    color:var(--text-faint);cursor:grab;padding:4px 0;
    touch-action:none;
  }
  .drag-handle:hover{color:var(--text-dim);}
  .row.body{transition:background .12s, box-shadow .12s, opacity .12s;}
  .row.body.dragging{opacity:0.4;}
  .row.body.drag-over-top{box-shadow: inset 0 2px 0 0 var(--accent);}
  .row.body.drag-over-bottom{box-shadow: inset 0 -2px 0 0 var(--accent);}
  .actions{display:flex;gap:4px;justify-content:flex-end;padding-right:2px;}
  .icon-btn{
    background:none;border:none;cursor:pointer;color:var(--text-faint);
    padding:5px;border-radius:6px;display:flex;align-items:center;justify-content:center;
    transition:color .15s, background .15s;
  }
  .icon-btn:hover{background:var(--surface-hover);color:var(--text);}
  .icon-btn.del:hover{color:var(--danger);}

  .empty{padding:60px 20px;text-align:center;color:var(--text-faint);}
  .empty b{color:var(--text-dim);display:block;margin-bottom:6px;font-size:14px;}

  /* modal */
  .overlay{
    position:fixed;inset:0;background:rgba(8,9,12,0.6);backdrop-filter:blur(2px);
    display:none;align-items:center;justify-content:center;z-index:50;
    animation:fadeIn .15s ease;
  }
  .overlay.show{display:flex;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{
    background:var(--surface);border:1px solid var(--border);border-radius:14px;
    width:420px;max-width:92vw;padding:22px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    animation:pop .15s ease;
  }
  @keyframes pop{from{transform:translateY(6px) scale(.98);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
  .modal h2{margin:0 0 16px;font-size:16px;font-weight:700;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:11.5px;color:var(--text-dim);margin-bottom:5px;font-weight:600;}
  .field input{
    width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
    padding:9px 10px;color:var(--text);font-size:13px;font-family:var(--sans);outline:none;
    transition:border-color .15s;
  }
  .field input:focus{border-color:var(--accent);}
  .field.pw-field{position:relative;}
  .field.pw-field input{padding-right:36px;font-family:var(--mono);}
  .pw-toggle{
    position:absolute;right:8px;top:29px;background:none;border:none;color:var(--text-faint);
    cursor:pointer;padding:4px;display:flex;
  }
  .pw-toggle:hover{color:var(--text);}
  .modal-actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px;}
  .modal-actions .right{display:flex;gap:8px;}
  .file-add-row{margin-bottom:8px;}
  .file-chip-list{display:flex;flex-wrap:wrap;gap:6px;}
  .file-chip{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--bg);border:1px solid var(--border);border-radius:7px;
    padding:4px 6px 4px 9px;font-size:12px;color:var(--text-dim);max-width:100%;
  }
  .file-chip .fname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px;}
  .file-chip .fsize{color:var(--text-faint);font-size:10.5px;flex-shrink:0;}
  .file-chip .fremove{
    background:none;border:none;cursor:pointer;color:var(--text-faint);
    display:flex;align-items:center;justify-content:center;padding:2px;border-radius:4px;flex-shrink:0;
  }
  .file-chip .fremove:hover{color:var(--danger);background:rgba(224,69,61,0.1);}
  .file-hint{font-size:11px;color:var(--text-faint);margin-top:6px;line-height:1.4;}

  .attach-chip{
    display:inline-flex;align-items:center;gap:4px;
    background:var(--surface-hover);border:1px solid var(--border);border-radius:6px;
    padding:2px 7px;font-size:11.5px;color:var(--text-dim);cursor:pointer;
    max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    transition:color .15s, border-color .15s;
  }
  .attach-chip:hover{color:var(--accent);border-color:var(--accent);}

  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="title-block">
      <h1>계정 관리</h1>
      <p id="countText">0개 항목</p>
    </div>
    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" class="search" id="searchInput" placeholder="사이트명 또는 ID 검색"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          data-lpignore="true" data-1p-ignore data-form-type="other" name="acctSearch_no_autofill">
        <button type="button" class="search-clear" id="searchClearBtn" title="검색어 지우기" style="display:none;" onclick="clearSearch()">✕</button>
      </div>
      <button class="btn btn-ghost" id="driveStatusBtn" onclick="onDriveButtonClick()" title="Google Drive에 첨부파일 저장">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l9 16H3z" opacity="0"/><path d="M8.5 3h7L21 12l-3.5 7h-11L3 12z"/></svg>
        <span id="driveStatusText">Drive 연결</span>
      </button>
      <button class="btn btn-ghost" id="gistStatusBtn" onclick="onGistButtonClick()" title="GitHub Gist에 데이터 백업/동기화">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
        <span id="gistStatusText">Gist 동기화</span>
      </button>
      <button class="icon-btn" onclick="exportToExcel()" title="Excel로 내보내기 (비밀번호는 마스킹됩니다)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="icon-btn" onclick="triggerImportExcel()" title="Excel에서 가져오기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </button>
      <input type="file" id="excelImportInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleExcelImport(this)">
      <button class="icon-btn" onclick="openSettingsModal()" title="설정">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.604.852 1 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button class="btn btn-primary" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        추가
      </button>
    </div>
  </div>

  <div class="table" id="tableWrap">
    <div class="row head">
      <div></div>
      <div></div>
      <div>사이트명<span class="col-resizer" data-col="2"></span></div>
      <div>ID<span class="col-resizer" data-col="3"></span></div>
      <div>Password<span class="col-resizer" data-col="4"></span></div>
      <div>Website<span class="col-resizer" data-col="5"></span></div>
      <div>비고<span class="col-resizer" data-col="6"></span></div>
      <div>첨부파일<span class="col-resizer" data-col="7"></span></div>
      <div></div>
    </div>
    <div id="rows"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">계정 추가</h2>
    <div class="field">
      <label>사이트명</label>
      <input type="text" id="f_site" placeholder="예: 교정부 메일">
    </div>
    <div class="field">
      <label>ID</label>
      <input type="text" id="f_id" placeholder="아이디 또는 이메일">
    </div>
    <div class="field pw-field">
      <label>Password</label>
      <input type="password" id="f_pw" placeholder="비밀번호">
      <button class="pw-toggle" onclick="toggleModalPw()">
        <svg id="modalEye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="field">
      <label>Website</label>
      <input type="text" id="f_web" placeholder="https://">
    </div>
    <div class="field">
      <label>비고</label>
      <input type="text" id="f_memo" placeholder="메모 (선택)">
    </div>
    <div class="field">
      <label>첨부파일</label>
      <div class="file-add-row">
        <button type="button" class="btn btn-ghost" onclick="document.getElementById('f_attach_file').click()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          파일 선택
        </button>
        <input type="file" id="f_attach_file" multiple style="display:none" onchange="handleFileSelect(this)">
      </div>
      <div class="file-chip-list" id="modalAttachList"></div>
      <div class="file-hint" id="attachHint">이 브라우저의 저장공간에 저장돼요. 파일 용량이 크거나 많으면 저장이 안 될 수 있어요.</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="deleteInModal" style="display:none;color:var(--danger);border-color:var(--danger);" onclick="deleteFromModal()">삭제</button>
      <div class="right">
        <button class="btn btn-ghost" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="saveEntry()">저장</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <h2>설정</h2>
    <div class="field">
      <label>Google OAuth Client ID</label>
      <input type="text" id="s_clientId" placeholder="xxxxxxxxxxxx.apps.googleusercontent.com">
    </div>
    <div class="file-hint">
      Google Cloud Console에서 발급한 OAuth 클라이언트 ID를 입력하세요.
    </div>
    <div class="modal-actions" style="margin-top:16px;">
      <span id="settingsDriveStatus" style="font-size:12px;color:var(--text-faint);"></span>
      <div class="right">
        <button class="btn btn-ghost" onclick="closeSettingsModal()">닫기</button>
        <button class="btn btn-primary" onclick="saveSettings()">저장</button>
      </div>
    </div>

    <hr style="border:none;border-top:1px solid var(--border);margin:20px 0;">

    <div class="field">
      <label>GitHub Personal Access Token</label>
      <input type="password" id="s_gistToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    </div>
    <div class="field">
      <label>Gist ID (선택)</label>
      <input type="text" id="s_gistId" placeholder="기존 Gist 사용 시 입력 (비우면 자동 생성)">
    </div>
    <div class="file-hint">
      gist 권한 토큰 입력 시 계정 데이터가 비공개 Gist에 자동 백업돼요 (첨부파일 제외).
    </div>
    <div class="modal-actions" style="margin-top:16px;">
      <span id="settingsGistStatus" style="font-size:12px;color:var(--text-faint);"></span>
      <div class="right">
        <button class="btn btn-ghost" onclick="retryGistSyncNow()">동기화 재시도</button>
        <button class="btn btn-ghost" onclick="pullFromGistManual()">지금 가져오기</button>
        <button class="btn btn-primary" onclick="saveGistSettings()">저장</button>
      </div>
    </div>

    <hr style="border:none;border-top:1px solid var(--border);margin:20px 0;">

    <div class="field" id="s_masterPwOldField" style="display:none;">
      <label>현재 잠금 비밀번호</label>
      <input type="password" id="s_masterPwOld" placeholder="변경하려면 현재 비밀번호를 먼저 입력하세요">
    </div>
    <div class="field">
      <label>잠금 비밀번호</label>
      <input type="password" id="s_masterPwNew" placeholder="새 잠금 비밀번호 (4자 이상)">
    </div>
    <div class="field">
      <input type="password" id="s_masterPwConfirm" placeholder="잠금 비밀번호 확인">
    </div>
    <div class="field">
      <input type="text" id="s_masterPwHint" placeholder="힌트 문구 (선택, 비밀번호 입력 화면에 표시돼요)">
    </div>
    <div class="file-hint">
      설정 시 비밀번호 표시/복사할 때마다 확인합니다. 이미 설정된 경우 변경/해제 시 현재 비밀번호 확인이 필요해요.
    </div>
    <div class="modal-actions" style="margin-top:16px;">
      <span id="settingsMasterPwStatus" style="font-size:12px;color:var(--text-faint);"></span>
      <div class="right">

function applyRemoteGistData(remote){
  let localUpdatedAt = 0;
  try{ localUpdatedAt = JSON.parse(localStorage.getItem(GIST_META_KEY) || 'null')?.updatedAt || 0; }catch(e){}
  if(remote.updatedAt && remote.updatedAt < localUpdatedAt) return false; // 로컬이 더 최신이면 건너뜀

  // 원격이 더 최신(또는 동일)이면 텍스트 정보는 원격 것으로 교체하되,
  // 로컬에만 있던 첨부파일 dataUrl은 보존한다 (Gist에는 저장 안 됨)
  const localById = {};
  entries.forEach(e => localById[e.id] = e);
  entries = remote.entries.map(re => {
    const local = localById[re.id];
    if(local && local.attachments){
      const merged = (re.attachments || []).map(ra => {
        const la = local.attachments.find(x => x.id === ra.id);
        return (la && la.dataUrl) ? {...ra, dataUrl: la.dataUrl} : ra;
      });
      return {...re, attachments: merged};
    }
    return re;
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  localStorage.setItem(GIST_META_KEY, JSON.stringify({updatedAt: remote.updatedAt || Date.now()}));
  if(remote.masterPw && remote.masterPw.hash && remote.masterPw.salt){
    localStorage.setItem(MASTER_PW_HASH_KEY, remote.masterPw.hash);
    localStorage.setItem(MASTER_PW_SALT_KEY, remote.masterPw.salt);
    if(remote.masterPw.hint) localStorage.setItem(MASTER_PW_HINT_KEY, remote.masterPw.hint);
    else localStorage.removeItem(MASTER_PW_HINT_KEY);
  }else{
    localStorage.removeItem(MASTER_PW_HASH_KEY);
    localStorage.removeItem(MASTER_PW_SALT_KEY);
    localStorage.removeItem(MASTER_PW_HINT_KEY);
  }
  if(remote.colWidths){
    applyColumnWidths(remote.colWidths);
  }
  return true;
}

    const wb = XLSX.read(buf, {type:'array'});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
    if(!rows.length){ alert('가져올 데이터가 없습니다.'); return; }

    const getVal = (r, keys) => {

    const newEntries = rows.map(r => ({

      idValue: getVal(r, ['ID','id','아이디']),

}

/* ===== 잠금 비밀번호 (마스터 비밀번호) ===== */
const MASTER_PW_HASH_KEY = 'account_manager_master_pw_hash';
const MASTER_PW_SALT_KEY = 'account_manager_master_pw_salt';
const MASTER_PW_HINT_KEY = 'account_manager_master_pw_hint';

function hasMasterPassword(){ return !!localStorage.getItem(MASTER_PW_HASH_KEY); }

async function sha256Hex(str){
  if(window.crypto && window.crypto.subtle){
    try{
      const enc = new TextEncoder().encode(str);
      const buf = await crypto.subtle.digest('SHA-256', enc);
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }catch(e){ /* 폴백으로 진행 */ }
  }
  // SubtleCrypto를 쓸 수 없는 환경을 위한 간단한 폴백 해시 (보안 강도는 낮음)
  let h1 = 0xdeadbeef, h2 = 0x41c6ce57;
  for(let i=0;i<str.length;i++){
    const ch = str.charCodeAt(i);
    h1 = Math.imul(h1 ^ ch, 2654435761);
    h2 = Math.imul(h2 ^ ch, 1597334677);
  }
  h1 = Math.imul(h1 ^ (h1>>>16), 2246822507) ^ Math.imul(h2 ^ (h2>>>13), 3266489909);
  h2 = Math.imul(h2 ^ (h2>>>16), 2246822507) ^ Math.imul(h1 ^ (h1>>>13), 3266489909);
  return (h1>>>0).toString(16).padStart(8,'0') + (h2>>>0).toString(16).padStart(8,'0');
}

function randomSalt(){
  const arr = new Uint8Array(16);
  (window.crypto || {}).getRandomValues ? crypto.getRandomValues(arr) : arr.forEach((_,i)=>arr[i]=Math.floor(Math.random()*256));
  return Array.from(arr).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function checkMasterPassword(pw){
  const salt = localStorage.getItem(MASTER_PW_SALT_KEY) || '';
  const hash = await sha256Hex(salt + ':' + pw);
  return hash === localStorage.getItem(MASTER_PW_HASH_KEY);
}

async function saveMasterPassword(){
  const pw1 = document.getElementById('s_masterPwNew').value;
  const pw2 = document.getElementById('s_masterPwConfirm').value;
  const hint = document.getElementById('s_masterPwHint').value.trim();
  if(!pw1){ alert('새 잠금 비밀번호를 입력해주세요.'); return; }
  if(pw1.length < 4){ alert('잠금 비밀번호는 4자 이상으로 설정해주세요.'); return; }
  if(pw1 !== pw2){ alert('비밀번호 확인이 일치하지 않습니다.'); return; }

  // 이미 잠금 비밀번호가 설정되어 있다면, 변경 전에 현재 비밀번호가 맞는지 먼저 확인
  if(hasMasterPassword()){
    const oldPw = document.getElementById('s_masterPwOld').value;
    if(!oldPw){ alert('현재 잠금 비밀번호를 입력해주세요.'); return; }
    const ok = await checkMasterPassword(oldPw);
    if(!ok){
      alert('현재 잠금 비밀번호가 일치하지 않습니다.');
      document.getElementById('s_masterPwOld').value = '';
      return;
    }
  }

  const salt = randomSalt();
  const hash = await sha256Hex(salt + ':' + pw1);
  localStorage.setItem(MASTER_PW_SALT_KEY, salt);
  localStorage.setItem(MASTER_PW_HASH_KEY, hash);
  if(hint){
    localStorage.setItem(MASTER_PW_HINT_KEY, hint);
  }else{
    localStorage.removeItem(MASTER_PW_HINT_KEY);
  }
  sessionUnlocked = false;
  document.getElementById('s_masterPwOld').value = '';
  document.getElementById('s_masterPwNew').value = '';
  document.getElementById('s_masterPwConfirm').value = '';
  document.getElementById('s_masterPwOldField').style.display = 'block';
  updateMasterPwStatus();
  queueGistSync();
  alert('잠금 비밀번호가 설정되었습니다.');
}

async function removeMasterPassword(){
  if(!hasMasterPassword()){ alert('설정된 잠금 비밀번호가 없어요.'); return; }
  const oldPw = document.getElementById('s_masterPwOld').value;
  if(!oldPw){ alert('잠금 해제하려면 현재 잠금 비밀번호를 먼저 입력해주세요.'); return; }
  const ok = await checkMasterPassword(oldPw);
  if(!ok){
    alert('현재 잠금 비밀번호가 일치하지 않습니다.');
    document.getElementById('s_masterPwOld').value = '';
    return;
  }
  if(!confirm('잠금 비밀번호를 해제할까요? 이후에는 확인 절차 없이 바로 볼 수 있게 됩니다.')) return;
  localStorage.removeItem(MASTER_PW_HASH_KEY);
  localStorage.removeItem(MASTER_PW_SALT_KEY);
  localStorage.removeItem(MASTER_PW_HINT_KEY);
  sessionUnlocked = false;
  document.getElementById('s_masterPwOldField').style.display = 'none';
  document.getElementById('s_masterPwOld').value = '';
  updateMasterPwStatus();
  queueGistSync();
}

function closeVerifyModal(){

}
async function confirmVerifyPw(){

/* ===== Google Drive 연동 ===== */
const DRIVE_CLIENT_ID_KEY = 'account_manager_drive_client_id';
const DRIVE_FOLDER_ID_KEY = 'account_manager_drive_folder_id_v2'; // v2: API_첨부파일/계정관리 구조로 변경
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';

let driveAccessToken = null;
let driveTokenClient = null;
let driveFolderId = localStorage.getItem(DRIVE_FOLDER_ID_KEY) || null;

function isDriveConnected(){ return !!driveAccessToken; }

function loadGisScript(cb){
  if(window.google && window.google.accounts && window.google.accounts.oauth2){ cb(); return; }
  const existing = document.getElementById('gis-script');
  if(existing){ existing.addEventListener('load', cb); return; }
  const s = document.createElement('script');
  s.id = 'gis-script';
  s.src = 'https://accounts.google.com/gsi/client';
  s.async = true; s.defer = true;
  s.onload = cb;
  s.onerror = () => alert('Google 인증 스크립트를 불러오지 못했습니다. 네트워크 상태를 확인해주세요.');
  document.head.appendChild(s);
}

function initDriveTokenClient(){
  const clientId = localStorage.getItem(DRIVE_CLIENT_ID_KEY);
  if(!clientId) return null;
  driveTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: DRIVE_SCOPE,
    callback: (resp) => {
      updateDriveButtonState('idle');
      if(resp.error){
        alert('Google Drive 인증에 실패했습니다: ' + resp.error);
        return;
      }
      driveAccessToken = resp.access_token;
      updateDriveButtonState('connected');
    }
  });
  return driveTokenClient;
}

function onDriveButtonClick(){
  if(isDriveConnected()){
    if(confirm('Google Drive 연결을 해제할까요? (이미 업로드된 파일은 Drive에 그대로 남아요)')){
      driveAccessToken = null;
      updateDriveButtonState('idle');
    }
    return;
  }
  const clientId = localStorage.getItem(DRIVE_CLIENT_ID_KEY);
  if(!clientId){
    openSettingsModal();
    return;
  }
  updateDriveButtonState('connecting');
  loadGisScript(()=>{
    const client = driveTokenClient || initDriveTokenClient();
    if(client) client.requestAccessToken({prompt:'consent'});
  });
}

function updateDriveButtonState(state){
  const btn = document.getElementById('driveStatusBtn');
  const text = document.getElementById('driveStatusText');
  const settingsStatus = document.getElementById('settingsDriveStatus');
  btn.classList.remove('connected','connecting');
  if(state === 'connected'){
    btn.classList.add('connected');
    text.textContent = 'Drive 연결됨';
  }else if(state === 'connecting'){
    btn.classList.add('connecting');
    text.textContent = '연결 중...';
  }else{
    text.textContent = 'Drive 연결';
  }
  if(settingsStatus){
    settingsStatus.textContent = isDriveConnected() ? '연결됨' : '연결되지 않음';
  }
}

function driveFetch(url, options={}){
  options.headers = Object.assign({}, options.headers, {'Authorization': 'Bearer ' + driveAccessToken});
  return fetch(url, options);
}

async function findOrCreateDriveFolder(name, parentId){
  const parentClause = parentId ? ` and '${parentId}' in parents` : " and 'root' in parents";
  const q = encodeURIComponent(`mimeType='application/vnd.google-apps.folder' and name='${name}' and trashed=false${parentClause}`);
  const res = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
  const data = await res.json();
  if(data.files && data.files.length){
    return data.files[0].id;
  }
  const metadata = {name, mimeType:'application/vnd.google-apps.folder'};
  if(parentId) metadata.parents = [parentId];
  const createRes = await driveFetch('https://www.googleapis.com/drive/v3/files', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(metadata)
  });
  const created = await createRes.json();
  return created.id;
}

async function ensureDriveFolder(){
  if(driveFolderId) return driveFolderId;
  const rootId = await findOrCreateDriveFolder('API_첨부파일', null);
  const subId = await findOrCreateDriveFolder('계정관리', rootId);
  driveFolderId = subId;
  localStorage.setItem(DRIVE_FOLDER_ID_KEY, driveFolderId);
  return driveFolderId;
}

async function uploadFileToDrive(file){
  await ensureDriveFolder();
  const metadata = {name: file.name, parents:[driveFolderId]};
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], {type:'application/json'}));
  form.append('file', file);
  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name', {
    method:'POST',
    headers:{'Authorization':'Bearer ' + driveAccessToken},
    body: form
  });
  if(!res.ok) throw new Error('업로드 실패 (' + res.status + ')');
  return res.json();
}

async function deleteFileFromDrive(fileId){
  if(!fileId || !isDriveConnected()) return;
  try{ await driveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}`, {method:'DELETE'}); }catch(e){}
}

async function downloadFileFromDrive(fileId, name){
  if(!isDriveConnected()){
    alert('Google Drive에 연결한 뒤 다시 시도해주세요.');
    return;
  }
  try{
    const res = await driveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
    if(res.status === 404){
      alert('파일이 삭제되었거나 존재하지 않습니다.');
      return;
    }
    if(!res.ok) throw new Error();
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url; link.download = name;
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }catch(e){
    alert('다운로드에 실패했습니다. Drive 연결 상태를 확인해주세요.');
  }
}

/* ===== GitHub Gist 동기화 ===== */
const GIST_TOKEN_KEY = 'account_manager_gist_token';
const GIST_ID_KEY = 'account_manager_gist_id';
const GIST_META_KEY = 'account_manager_entries_meta_v1';
const GIST_FILENAME = 'account_manager_data.json';

function isGistConnected(){ return !!localStorage.getItem(GIST_TOKEN_KEY); }

function gistHeaders(token){
  return {
    'Authorization': 'Bearer ' + token,
    'Content-Type': 'application/json',
    'Accept': 'application/vnd.github+json'
  };
}

const GIST_LAST_ERROR_KEY = 'account_manager_gist_last_error';

function updateGistStatus(state, errorDetail){
  const btn = document.getElementById('gistStatusBtn');
  const text = document.getElementById('gistStatusText');
  const settingsStatus = document.getElementById('settingsGistStatus');
  btn.classList.remove('connected','connecting','sync-error');
  if(state === 'off'){
    text.textContent = 'Gist 동기화';
    localStorage.removeItem(GIST_LAST_ERROR_KEY);
  }else if(state === 'syncing' || state === 'pending'){
    btn.classList.add('connecting');
    text.textContent = '동기화 중...';
  }else if(state === 'retrying'){
    btn.classList.add('connecting');
    text.textContent = '재시도 중...';
  }else if(state === 'error'){
    // 토큰/ID는 그대로 살아있음 (연결이 끊긴 게 아니라 "이번 동기화"가 실패한 것)
    btn.classList.add('connected','sync-error');
    text.textContent = '동기화 실패 ⚠';
    if(errorDetail) localStorage.setItem(GIST_LAST_ERROR_KEY, JSON.stringify({detail: errorDetail, at: Date.now()}));
  }else{
    // idle / synced - connected but not actively syncing
    btn.classList.add('connected');
    text.textContent = 'Gist 연결됨';
    localStorage.removeItem(GIST_LAST_ERROR_KEY);
  }
  if(settingsStatus){
    if(!isGistConnected()) settingsStatus.textContent = '연결되지 않음';
    else if(state === 'syncing' || state === 'pending') settingsStatus.textContent = '동기화 중...';
    else if(state === 'retrying') settingsStatus.textContent = '재시도 중...';
    else if(state === 'error'){
      let detail = '';
      try{
        const stored = JSON.parse(localStorage.getItem(GIST_LAST_ERROR_KEY) || 'null');
        if(stored && stored.detail) detail = stored.detail;
      }catch(e){}
      const authIssue = detail.includes('401') || detail.includes('403');
      settingsStatus.textContent = authIssue ? '토큰 인증 실패 - 권한 확인 필요' : '동기화 실패 (재시도함)';
      if(detail) settingsStatus.title = detail;
    }
    else settingsStatus.textContent = '연결됨 · 마지막 동기화: ' + (lastGistSyncLabel() || '-');
  }
}

function lastGistSyncLabel(){
  try{
    const meta = JSON.parse(localStorage.getItem(GIST_META_KEY) || 'null');
    if(!meta || !meta.updatedAt) return '';
    return new Date(meta.updatedAt).toLocaleString('ko-KR');
  }catch(e){ return ''; }
}

function onGistButtonClick(){
  if(isGistConnected()){
    if(confirm('Gist 동기화를 해제할까요? (기존 Gist의 데이터는 그대로 남아요)')){
      localStorage.removeItem(GIST_TOKEN_KEY);
      localStorage.removeItem(GIST_ID_KEY);
      updateGistStatus('off');

  }

async function saveGistSettings(){
  const token = document.getElementById('s_gistToken').value.trim();
  const gistId = document.getElementById('s_gistId').value.trim();
  if(token){
    localStorage.setItem(GIST_TOKEN_KEY, token);
  }else{
    localStorage.removeItem(GIST_TOKEN_KEY);
  }
  if(gistId){
    localStorage.setItem(GIST_ID_KEY, gistId);
  }else{
    localStorage.removeItem(GIST_ID_KEY);
  }
  closeSettingsModal();
  if(token){
    updateGistStatus('syncing');
    const savedGistId = localStorage.getItem(GIST_ID_KEY);
    // 기존에 이미 데이터(잠금 비밀번호 포함)가 저장된 Gist라면, 무작정 로컬 값으로 덮어쓰기 전에
    // 먼저 원격 데이터를 불러와 반영한다. (그렇지 않으면 새 브라우저에서 연결 시
    // 로컬의 "비밀번호 없음" 상태가 Gist로 그대로 올라가 원격 잠금 비밀번호가 사라져 버림)
    if(savedGistId){
      const remote = await fetchGistData(token, savedGistId);
      if(remote && Array.isArray(remote.entries)){
        applyRemoteGistData(remote);
        sessionUnlocked = false;
        updateMasterPwStatus();
        render();

    syncToGistNow();

    updateGistStatus('off');

async function pullFromGistManual(){
  const token = document.getElementById('s_gistToken').value.trim() || localStorage.getItem(GIST_TOKEN_KEY);
  const gistId = document.getElementById('s_gistId').value.trim() || localStorage.getItem(GIST_ID_KEY);
  if(!token || !gistId){
    alert('토큰과 Gist ID를 먼저 입력하고 저장해주세요.');
    return;
  }
  if(!confirm('Gist에 저장된 데이터로 현재 목록을 덮어씁니다. 계속할까요?')) return;
  updateGistStatus('syncing');
  const remote = await fetchGistData(token, gistId);
  if(remote && Array.isArray(remote.entries)){
    entries = remote.entries;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    localStorage.setItem(GIST_META_KEY, JSON.stringify({updatedAt: remote.updatedAt || Date.now()}));
    if(remote.masterPw && remote.masterPw.hash && remote.masterPw.salt){
      localStorage.setItem(MASTER_PW_HASH_KEY, remote.masterPw.hash);
      localStorage.setItem(MASTER_PW_SALT_KEY, remote.masterPw.salt);
      if(remote.masterPw.hint) localStorage.setItem(MASTER_PW_HINT_KEY, remote.masterPw.hint);
      else localStorage.removeItem(MASTER_PW_HINT_KEY);
    }else{
      localStorage.removeItem(MASTER_PW_HASH_KEY);
      localStorage.removeItem(MASTER_PW_SALT_KEY);
      localStorage.removeItem(MASTER_PW_HINT_KEY);
    }
    if(remote.colWidths){
      applyColumnWidths(remote.colWidths);
    }
    sessionUnlocked = false;
    updateGistStatus('idle');
    updateMasterPwStatus();
    closeSettingsModal();
    render();
    alert('Gist에서 데이터를 불러왔습니다.');
  }else{
    updateGistStatus('error');
    alert('Gist에서 데이터를 불러오지 못했습니다.');
  }
}

async function fetchGistData(token, gistId){
  try{
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {headers: gistHeaders(token)});
    if(!res.ok) return null;
    const data = await res.json();
    const file = data.files && data.files[GIST_FILENAME];
    if(!file || !file.content) return null;
    return JSON.parse(file.content);
  }catch(e){ return null; }
}

let gistSyncTimer = null;
let gistSyncInFlight = false;   // 동시에 두 개의 동기화가 겹치는 것 방지
let gistSyncQueuedAgain = false; // 동기화 진행 중에 또 변경이 생겼는지
let gistRetryCount = 0;
const GIST_MAX_RETRY = 3;

function queueGistSync(){
  if(!isGistConnected()) return;
  updateGistStatus('pending');
  clearTimeout(gistSyncTimer);
  gistSyncTimer = setTimeout(syncToGistNow, 1500);
}

async function syncToGistNow(){
  const token = localStorage.getItem(GIST_TOKEN_KEY);
  if(!token) return;

  // 이미 동기화가 진행 중이면 끝난 뒤 다시 한 번 돌리도록 표시만 하고 리턴 (레이스 컨디션 방지)
  if(gistSyncInFlight){
    gistSyncQueuedAgain = true;
    return;
  }
  gistSyncInFlight = true;

  let gistId = localStorage.getItem(GIST_ID_KEY);
  const updatedAt = Date.now();
  const payloadEntries = entries.map(e => {
    const {attachments, ...rest} = e;
    const safeAttachments = (attachments || []).map(a => {
      const {dataUrl, ...meta} = a; // 대용량 로컬 첨부파일 원본은 Gist에 올리지 않음
      return meta;
    });
    return {...rest, attachments: safeAttachments};
  });
  const masterPw = hasMasterPassword()
    ? {hash: localStorage.getItem(MASTER_PW_HASH_KEY), salt: localStorage.getItem(MASTER_PW_SALT_KEY), hint: localStorage.getItem(MASTER_PW_HINT_KEY) || ''}
    : null;
  const colWidths = getColumnWidths();
  const body = {
    description: '계정 관리 데이터 백업 (자동 생성, 수동 편집 비추천)',
    public: false,
    files: { [GIST_FILENAME]: { content: JSON.stringify({entries: payloadEntries, updatedAt, masterPw, colWidths}, null, 2) } }
  };

  let errorDetail = null;
  try{
    let res;
    if(gistId){
      res = await fetch(`https://api.github.com/gists/${gistId}`, {method:'PATCH', headers: gistHeaders(token), body: JSON.stringify(body)});
      if(res.status === 404) gistId = null;
    }
    if(!gistId){
      res = await fetch('https://api.github.com/gists', {method:'POST', headers: gistHeaders(token), body: JSON.stringify(body)});
      const created = await res.json();
      if(created.id){
        gistId = created.id;
        localStorage.setItem(GIST_ID_KEY, gistId);
      }
    }
    if(!res.ok){
      let apiMsg = '';
      try{ const errBody = await res.json(); apiMsg = errBody && errBody.message ? errBody.message : ''; }catch(e){}
      throw new Error(`HTTP ${res.status}${apiMsg ? ' - ' + apiMsg : ''}`);
    }
    localStorage.setItem(GIST_META_KEY, JSON.stringify({updatedAt}));
    updateGistStatus('idle');
    gistRetryCount = 0;
  }catch(e){
    errorDetail = (e && e.message) ? e.message : '네트워크 오류';
  }

  gistSyncInFlight = false;

  if(errorDetail){
    // 401/403(토큰 문제)은 재시도해도 소용없으니 바로 에러로 표시
    const isAuthError = errorDetail.includes('401') || errorDetail.includes('403');
    if(!isAuthError && gistRetryCount < GIST_MAX_RETRY){
      gistRetryCount++;
      updateGistStatus('retrying', errorDetail);
      const backoffMs = gistRetryCount * 4000; // 4s, 8s, 12s
      clearTimeout(gistSyncTimer);
      gistSyncTimer = setTimeout(syncToGistNow, backoffMs);
    }else{
      gistRetryCount = 0;
      updateGistStatus('error', errorDetail);
    }
    return;
  }

  // 동기화 도중에 또 변경사항이 쌓였다면 이어서 한 번 더 동기화
  if(gistSyncQueuedAgain){
    gistSyncQueuedAgain = false;
    queueGistSync();
  }
}

function retryGistSyncNow(){
  gistRetryCount = 0;
  clearTimeout(gistSyncTimer);
  updateGistStatus('syncing');
  syncToGistNow();
}

async function handleFileSelect(input){
  const files = Array.from(input.files || []);
  input.value = '';
  for(const file of files){
    if(isDriveConnected()){
      const chip = {id: uid(), name:file.name, size:file.size, type:file.type, source:'drive', uploading:true};
      modalAttachments.push(chip);
      renderModalAttachments();
      try{
        const uploaded = await uploadFileToDrive(file);
        chip.driveId = uploaded.id;
        chip.uploading = false;
      }catch(err){
        modalAttachments = modalAttachments.filter(a => a.id !== chip.id);
        alert(file.name + ' 업로드에 실패했습니다.');
      }
      renderModalAttachments();
    }else{
      await new Promise(resolve=>{
        const reader = new FileReader();
        reader.onload = () => {
          modalAttachments.push({id: uid(), name:file.name, size:file.size, type:file.type, source:'local', dataUrl:reader.result});
          renderModalAttachments();
          resolve();
        };
        reader.readAsDataURL(file);
      });
    }
  }
}
function renderModalAttachments(){
  const el = document.getElementById('modalAttachList');
  if(!modalAttachments.length){ el.innerHTML = ''; return; }
  el.innerHTML = modalAttachments.map(a => `
    <span class="file-chip">
      <span class="fname" title="${esc(a.name)}">${a.uploading ? '업로드 중… ' : ''}${esc(a.name)}</span>
      <span class="fsize">${a.source === 'drive' ? 'Drive' : formatSize(a.size)}</span>
      <button type="button" class="fremove" title="제거" onclick="removeModalAttachment('${a.id}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </span>`).join('');
}
function removeModalAttachment(id){
  requireUnlock(()=>{
    const a = modalAttachments.find(x=>x.id===id);
    if(a && a.source === 'drive' && a.driveId) deleteFileFromDrive(a.driveId);
    modalAttachments = modalAttachments.filter(a=>a.id!==id);
    renderModalAttachments();
  });
}
function downloadAttachment(entryId, attachId){
  const e = entries.find(x=>x.id===entryId);
  if(!e || !e.attachments) return;
  const a = e.attachments.find(x=>x.id===attachId);
  if(!a) return;
  if(a.source === 'drive' && a.driveId){
    downloadFileFromDrive(a.driveId, a.name);
  }else if(a.dataUrl){
    const link = document.createElement('a');
    link.href = a.dataUrl;
    link.download = a.name;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }
}

function saveEntry(){
  if(modalAttachments.some(a => a.uploading)){
    alert('첨부파일 업로드가 아직 끝나지 않았어요. 잠시만 기다린 후 다시 저장해주세요.');
    return;
  }
  const site = document.getElementById('f_site').value.trim();
  const idValue = document.getElementById('f_id').value.trim();
  const pw = document.getElementById('f_pw').value;
  const web = document.getElementById('f_web').value.trim();
  const memo = document.getElementById('f_memo').value.trim();
  const attachments = JSON.parse(JSON.stringify(modalAttachments));

  if(!site){ alert('사이트명을 입력해주세요.'); return; }

  const commitSave = () => {
    if(editingId){
      const e = entries.find(x=>x.id===editingId);
      Object.assign(e, {site, idValue, pw, web, memo, attachments});
    }else{
      entries.unshift({id: uid(), site, idValue, pw, web, memo, attachments});
    }
    if(!save()) return;
    closeModal();
    render();
  };

  if(editingId){
    requireUnlock(commitSave);
  }else{
    commitSave();
  }
}
function editEntry(id){ openModal(id); }
function deleteFromModal(){
  if(!editingId) return;
  requireUnlock(()=>{
    if(confirm('이 계정을 삭제하시겠습니까?')){
      const target = entries.find(x=>x.id===editingId);
      (target && target.attachments || []).forEach(a => { if(a.source === 'drive' && a.driveId) deleteFileFromDrive(a.driveId); });
      entries = entries.filter(x=>x.id!==editingId);
      save();
      closeModal();
      render();
    }
  });
}
function quickDelete(id){
  requireUnlock(()=>{
    if(confirm('이 계정을 삭제하시겠습니까?')){
      const target = entries.find(x=>x.id===id);
      (target && target.attachments || []).forEach(a => { if(a.source === 'drive' && a.driveId) deleteFileFromDrive(a.driveId); });
      entries = entries.filter(x=>x.id!==id);
      delete revealed[id];
      save();
      render();
    }
  });
}

/* 드래그 앤 드롭으로 순서 변경 */
let dragSourceId = null;

function onDragStart(ev){
  const row = ev.currentTarget;
  dragSourceId = row.dataset.id;
  ev.dataTransfer.effectAllowed = 'move';
  ev.dataTransfer.setData('text/plain', dragSourceId);
  setTimeout(()=> row.classList.add('dragging'), 0);
}

function onDragOver(ev){
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'move';
  const row = ev.currentTarget;
  if(row.dataset.id === dragSourceId) return;
  const rect = row.getBoundingClientRect();
  const isTopHalf = (ev.clientY - rect.top) < rect.height / 2;
  row.classList.toggle('drag-over-top', isTopHalf);
  row.classList.toggle('drag-over-bottom', !isTopHalf);
}

function onDragLeave(ev){
  ev.currentTarget.classList.remove('drag-over-top','drag-over-bottom');
}

function onDrop(ev){
  ev.preventDefault();
  const row = ev.currentTarget;
  const targetId = row.dataset.id;
  const isTopHalf = row.classList.contains('drag-over-top');
  row.classList.remove('drag-over-top','drag-over-bottom');
  if(!dragSourceId || dragSourceId === targetId) return;

  const fromIdx = entries.findIndex(x=>x.id===dragSourceId);
  let toIdx = entries.findIndex(x=>x.id===targetId);
  if(fromIdx === -1 || toIdx === -1) return;

  const [moved] = entries.splice(fromIdx, 1);
  toIdx = entries.findIndex(x=>x.id===targetId);
  const insertAt = isTopHalf ? toIdx : toIdx + 1;
  entries.splice(insertAt, 0, moved);

  save();
  render();
}

function onDragEnd(ev){
  ev.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(el=>{
    el.classList.remove('drag-over-top','drag-over-bottom');
  });
  dragSourceId = null;
}

document.getElementById('searchInput').addEventListener('input', render);
function clearSearch(){
  const input = document.getElementById('searchInput');
  input.value = '';
  render();
  input.focus();
}
document.getElementById('overlay').addEventListener('click', (e)=>{

});
document.getElementById('settingsOverlay').addEventListener('click', (e)=>{

/* ===== 컬럼 폭 드래그 리사이즈 (Gist에 동기화, localStorage는 즉시표시용 캐시) ===== */
const COL_WIDTHS_KEY = 'account_manager_col_widths';
const COL_VARS = ['--w2','--w3','--w4','--w5','--w6','--w7'];
const tableWrapEl = document.getElementById('tableWrap');

function applyColumnWidths(widths){
  if(!widths) return;
  // 원격에 아직 반영 안 된(동기화 전) 컬럼 폭은 건드리지 않는다.
  // 원격 값이 있는 컬럼만 갱신하고, 없는 컬럼은 로컬 값을 그대로 유지한다.
  COL_VARS.forEach(k=>{
    if(widths[k]) tableWrapEl.style.setProperty(k, widths[k]);
  });
  const merged = Object.assign({}, JSON.parse(localStorage.getItem(COL_WIDTHS_KEY) || '{}'), widths);
  localStorage.setItem(COL_WIDTHS_KEY, JSON.stringify(merged));
}

function loadColumnWidths(){
  // Gist 동기화가 끝나기 전, 새로고침 시 깜빡임 없이 즉시 반영하기 위한 로컬 캐시
  try{
    const saved = JSON.parse(localStorage.getItem(COL_WIDTHS_KEY) || '{}');
    Object.entries(saved).forEach(([k,v]) => tableWrapEl.style.setProperty(k, v));
  }catch(e){}
}

function getColumnWidths(){
  const widths = {};
  COL_VARS.forEach(k=>{
    const v = tableWrapEl.style.getPropertyValue(k);
    if(v) widths[k] = v;
  });
  return widths;
}

function saveColumnWidths(){
  const widths = getColumnWidths();
  localStorage.setItem(COL_WIDTHS_KEY, JSON.stringify(widths));
  queueGistSync(); // Gist 연결 시 다른 컬럼 값과 함께 자동 업로드됨 (미연결이면 내부에서 무시)
}

function resetColumnWidths(){
  COL_VARS.forEach(k => tableWrapEl.style.removeProperty(k));
  localStorage.removeItem(COL_WIDTHS_KEY);
  queueGistSync();
}

document.querySelectorAll('.col-resizer').forEach(handle => {
  const varName = '--w' + handle.dataset.col;
  const headerCell = handle.parentElement;

  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    const startX = e.clientX;
    const startWidth = headerCell.getBoundingClientRect().width;
    const MIN_WIDTH_PX = 60; // 이 이하로는 좁아지지 않도록
    handle.classList.add('resizing');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    function onMove(e2){
      // 고정 px로 저장: 이 컬럼만 바뀌고, 다른 고정 컬럼들은 그대로 유지된다.
      // (남는 공간은 가변 컬럼인 첨부파일이 자동으로 흡수/양보한다)
      const newWidthPx = Math.max(MIN_WIDTH_PX, startWidth + (e2.clientX - startX));
      tableWrapEl.style.setProperty(varName, newWidthPx.toFixed(0) + 'px');
    }
    function onUp(){
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      handle.classList.remove('resizing');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      saveColumnWidths();
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  handle.addEventListener('dblclick', () => {
    tableWrapEl.style.removeProperty(varName);
    saveColumnWidths();
  });
});

(async function init(){
  loadColumnWidths();
  await load();
  render();
})();
</script>
